<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Image Gallery</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a', // slate-900
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="antialiased p-4 sm:p-6 md:p-8 lg:p-12">

    <!-- Header -->
    <header class="max-w-7xl mx-auto mb-10 text-center">
        <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Gallery</h1>
        <p class="text-sm sm:text-base md:text-lg text-slate-400 max-w-2xl mx-auto">Explore stunning high-quality images with advanced filtering, search, and a beautiful immersive lightbox experience.</p>
    </header>

    <!-- Controls (Search & Filters) -->
    <div class="max-w-7xl mx-auto mb-10 bg-slate-900/80 backdrop-blur-md p-3 px-4 rounded-2xl md:rounded-full border border-white/10 shadow-lg flex flex-col md:flex-row gap-4 justify-between items-center">
        <!-- Search Bar -->
        <div class="relative w-full md:w-1/2 lg:w-1/3">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="search-input" placeholder="Search by title or category..." class="w-full bg-slate-800/50 text-white placeholder-slate-400 rounded-full py-2 pl-10 pr-4 outline-none border border-white/10 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-2 justify-center" id="filter-buttons">
            <button class="filter-btn active px-4 py-2 rounded-full text-sm font-medium bg-white/5" data-filter="All">All</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white/5" data-filter="Nature">Nature</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white/5" data-filter="Animals">Animals</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white/5" data-filter="Travel">Travel</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white/5" data-filter="Food">Food</button>
        </div>
    </div>

    <!-- Gallery Grid -->
    <main class="max-w-7xl mx-auto min-h-[50vh]">
        <div id="gallery-grid" class="grid grid-cols-4 gap-2 sm:gap-4 md:gap-6 lg:gap-8">
            <!-- Images will be injected here via JS -->
        </div>
        <!-- No Results Message -->
        <div id="no-results" class="hidden text-center text-slate-400 mt-20 text-lg">
            <svg class="w-16 h-16 mx-auto mb-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            No images found matching your criteria.
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-lg" id="lightbox-backdrop"></div>
        
        <!-- Controls -->
        <button id="lightbox-close" class="absolute top-4 right-4 md:top-6 md:right-6 text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-full p-2 transition-all z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <!-- Navigation -->
        <button id="lightbox-prev" class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-full p-2 md:p-3 transition-all z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button id="lightbox-next" class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white bg-white/10 hover:bg-white/20 rounded-full p-2 md:p-3 transition-all z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>

        <!-- Content -->
        <div class="absolute inset-0 flex flex-col items-center justify-center p-4 md:p-12 z-40 pointer-events-none">
            <div class="relative max-w-5xl max-h-[75vh] flex items-center justify-center pointer-events-auto">
                <img id="lightbox-img" src="" alt="Preview" class="max-w-full max-h-[60vh] sm:max-h-[75vh] lg:max-h-[85vh] object-contain rounded-lg shadow-2xl">
            </div>
            
            <div class="mt-4 md:mt-6 text-center text-white pointer-events-auto">
                <h3 id="lightbox-title" class="text-xl sm:text-2xl lg:text-3xl font-semibold mb-1"></h3>
                <span id="lightbox-category" class="inline-block px-3 py-1 bg-blue-500/20 text-blue-300 text-sm rounded-full mb-4 border border-blue-500/30"></span>
                
                <!-- Slideshow Controls -->
                <div class="flex items-center justify-center gap-4 bg-white/10 backdrop-blur-md rounded-full px-6 py-2 mx-auto w-fit border border-white/10">
                    <button id="slideshow-prev" class="text-white/70 hover:text-white p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                    <button id="slideshow-toggle" class="text-white hover:scale-110 transition-transform p-1">
                        <!-- Play Icon -->
                        <svg id="icon-play" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <!-- Pause Icon (hidden by default) -->
                        <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="slideshow-next" class="text-white/70 hover:text-white p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
                    <div class="w-px h-4 bg-white/20 mx-2"></div>
                    <span id="lightbox-counter" class="text-sm font-medium text-white/70 tracking-wide">1 / 10</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="./script.js"></script>
</body>
</html>
